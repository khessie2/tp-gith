<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ma Liste de Courses</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Ma Gestion de Tâches</h1>
    
    <main class="container">
        <section class="todo-list">
            <h2>Liste des courses</h2>
            <div class="add-task">
                <input type="text" id="taskInput" placeholder="Ajouter un article...">
                <button id="addBtn">Ajouter</button>
            </div>
            <ul id="items"></ul>
        </section>
         <section class="task-details">
            <h2>Détails de la tâche</h2>
            <div id="details">
                <p><strong>Titre :</strong> <span id="detailTitle">-</span></p>
                <p><strong>Description :</strong> <span id="detailDesc">-</span></p>
                <p><strong>État :</strong> <span id="detailStatus">-</span></p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
